# ---------- WALLPAPER-DERIVED COLORS (pywal) ----------
source = ~/.cache/wal/colors-hypr.conf

# ---------- ENV ----------
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1

# ---------- INPUT (note the braces! the earlier error was missing these) ----------

# External monitor (DP-2) on the LEFT, laptop (eDP-2) on the RIGHT
monitor=DP-2,1920x1080@60,0x0,1
monitor=eDP-2,1920x1080@165,1920x0,1
monitor=,preferred,auto,1

# ----- Workspace → Monitor mapping -----
# Laptop screen (eDP-2) gets workspaces 1–5
workspace=1,monitor:eDP-2
workspace=2,monitor:eDP-2
workspace=3,monitor:eDP-2
workspace=4,monitor:eDP-2
workspace=5,monitor:eDP-2
# External monitor (DP-1) gets workspaces 6–8
workspace=6,monitor:DP-1
workspace=7,monitor:DP-1
workspace=8,monitor:DP-1


input {
    kb_layout = us
        follow_mouse = 1

        touchpad {
            natural_scroll = true
                disable_while_typing = true
                tap-to-click = true
                clickfinger_behavior = true
                middle_button_emulation = true
                drag_lock = true
                scroll_factor = 0.60
        }

    sensitivity = -0.25
        accel_profile = adaptive
}

general {
    layout = dwindle
        gaps_in = 2
        gaps_out = 2
        border_size = 1
        col.active_border = $col_active
        col.inactive_border = $col_inactive
}
decoration {
    rounding = 2
    blur {
        enabled = true
        size = 8
        passes = 3
    }
}

# Glass effect for waybar
blurls = waybar
layerrule[0] = blur, waybar
layerrule[1] = ignorezero, waybar

# ---------- AUTOSTART ----------
# Bring up the systemd user session so graphical-session.target activates.
# Without this, xdg-desktop-portal (Requisite=graphical-session.target) never
# starts, and Flameshot can't capture on Wayland. Must run before anything else.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user start hyprland-session.target

exec-once = hyprpaper
exec-once = waypaper --restore
exec-once = waybar

# ---------- KEYS ----------
$mod = SUPER
bind = $mod, T, exec, kitty
bind = $mod, W, exec, firefox
bind = $mod, E, exec, dolphin
bind = $mod, P, exec, waypaper
bind = $mod, D, exec, wofi --show drun --normal-window --conf ~/.config/wofi/config --style ~/.config/wofi/style.css
bind = $mod, Q, killactive,
     bind = $mod, M, togglefloating,
     bind = $mod, minus, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
     bind = $mod, equal, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
     bind = $mod, 0, exec, pactl set-sink-volume @DEFAULT_SINK@ 0%
     bind = $mod, 9, exec, pactl set-sink-volume @DEFAULT_SINK@ 100%
     bind = $mod SHIFT, R, exec, hyprctl reload
     bind = $mod SHIFT, E, exec, hyprctl dispatch exit
     bind = SUPER SHIFT, P, exec, systemctl poweroff
     bind = SUPER SHIFT, R, exec, systemctl reboot
     bind = SUPER, F, exec, ~/.config/hypr/scripts/focus_mode.sh

# Screenshots (grim + slurp): select a region, copy it to the clipboard
     bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Move app to workpace
     bind = SUPER SHIFT, 1, movetoworkspace, 1
     bind = SUPER SHIFT, 2, movetoworkspace, 2
     bind = SUPER SHIFT, 3, movetoworkspace, 3
     bind = SUPER SHIFT, 4, movetoworkspace, 4
     bind = SUPER SHIFT, 5, movetoworkspace, 5
     bind = SUPER SHIFT, 6, movetoworkspace, 6
     bind = SUPER SHIFT, 7, movetoworkspace, 7
     bind = SUPER SHIFT, 8, movetoworkspace, 8

# Switch to workspace 1–8
     bind = SUPER, 1, workspace, 1
     bind = SUPER, 2, workspace, 2
     bind = SUPER, 3, workspace, 3
     bind = SUPER, 4, workspace, 4
     bind = SUPER, 5, workspace, 5
     bind = SUPER, 6, workspace, 6
     bind = SUPER, 7, workspace, 7
     bind = SUPER, 8, workspace, 8

# Focus windows with arrow keys
     bind = SUPER, LEFT,  movefocus, l
     bind = SUPER, RIGHT, movefocus, r
     bind = SUPER, UP,    movefocus, u
     bind = SUPER, DOWN,  movefocus, d

# Move / resize windows with mouse
     bindm = $mod, mouse:272, movewindow
     bind = $mod SHIFT, LEFT,  resizeactive, -80 0
     bind = $mod SHIFT, RIGHT, resizeactive,  80 0
     bind = $mod SHIFT, UP,    resizeactive,  0 -80
     bind = $mod SHIFT, DOWN,  resizeactive,  0  80

     animations {
         enabled = false
     }

animations {
    enabled = yes
        bezier = snappy, 0.25, 0.9, 0.3, 1
        bezier = smooth, 0.4, 0.0, 0.2, 1
        animation = windows,     1, 4, snappy, slide
        animation = windowsIn,   1, 4, snappy, slide
        animation = windowsOut,  1, 3, snappy, slide
        animation = fade,        1, 4, smooth
        animation = border,      1, 5, smooth
        animation = workspaces,  1, 4, snappy, slidefade
        animation = layers,      1, 4, snappy, fade
}

windowrule = match:class waypaper, float on


splash = false
